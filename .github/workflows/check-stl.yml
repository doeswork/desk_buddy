name: Export STL Files

on:
  pull_request:
    branches:
      - master
    paths:
      - 'hardware/desk_buddy.FCStd'
      - 'hardware/export_stls.py'

jobs:
  export-stls:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref }}

    - name: Install FreeCAD
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y freecad-python3

    - name: Export STLs from FreeCAD
      run: |
        FreeCADCmd hardware/export_stls.py

    - name: Commit updated STLs
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add hardware/STLs/
        if git diff --cached --quiet; then
          echo "No STL changes to commit."
        else
          git commit -m "Auto-export STLs from FreeCAD [skip ci]"
          git push
        fi
